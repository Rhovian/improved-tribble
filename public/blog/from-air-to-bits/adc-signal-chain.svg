<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Block gradients -->
    <linearGradient id="cyanBlockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00CEC9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00CEC9" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goldBlockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a050" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4a050" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="greenBlockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#55efc4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#55efc4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="purpleBlockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a29bfe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#00CEC9" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" letter-spacing="1.5">ANALOG-TO-DIGITAL CONVERSION</text>
  <text x="500" y="58" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="1">From Continuous Voltage to Discrete Samples</text>

  <!-- ==================== SIGNAL CHAIN BLOCKS ==================== -->
  <!-- Block positions: evenly spaced across the width -->
  <!-- Y center for blocks: 200 -->

  <!-- ===== BLOCK 1: Mic Capsule ===== -->
  <g>
    <rect x="42" y="165" width="120" height="70" rx="10" fill="url(#cyanBlockGrad)" stroke="#00CEC9" stroke-width="1.2"/>
    <text x="102" y="195" text-anchor="middle" fill="#00CEC9" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Mic Capsule</text>
    <text x="102" y="215" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">μV – mV signal</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="200" x2="202" y2="200" stroke="#00CEC9" stroke-width="1.5" opacity="0.5"/>
  <polygon points="202,200 195,196 195,204" fill="#00CEC9" opacity="0.6"/>

  <!-- ===== BLOCK 2: Preamp ===== -->
  <g>
    <rect x="206" y="165" width="120" height="70" rx="10" fill="url(#goldBlockGrad)" stroke="#d4a050" stroke-width="1.2"/>
    <text x="266" y="195" text-anchor="middle" fill="#d4a050" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Preamp</text>
    <text x="266" y="215" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">→ line level (~1V)</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="326" y1="200" x2="366" y2="200" stroke="#d4a050" stroke-width="1.5" opacity="0.5"/>
  <polygon points="366,200 359,196 359,204" fill="#d4a050" opacity="0.6"/>

  <!-- ===== BLOCK 3: Anti-Aliasing Filter ===== -->
  <g>
    <rect x="370" y="165" width="120" height="70" rx="10" fill="url(#cyanBlockGrad)" stroke="#00CEC9" stroke-width="1.2"/>
    <text x="430" y="191" text-anchor="middle" fill="#00CEC9" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Anti-Alias</text>
    <text x="430" y="206" text-anchor="middle" fill="#00CEC9" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Filter</text>
    <text x="430" y="222" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">LP @ f<tspan font-size="8" dy="2">N</tspan><tspan dy="-2"></tspan></text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="490" y1="200" x2="530" y2="200" stroke="#00CEC9" stroke-width="1.5" opacity="0.5"/>
  <polygon points="530,200 523,196 523,204" fill="#00CEC9" opacity="0.6"/>

  <!-- ===== BLOCK 4: Sample & Hold ===== -->
  <g>
    <rect x="534" y="165" width="120" height="70" rx="10" fill="url(#greenBlockGrad)" stroke="#55efc4" stroke-width="1.2"/>
    <text x="594" y="191" text-anchor="middle" fill="#55efc4" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">Sample</text>
    <text x="594" y="206" text-anchor="middle" fill="#55efc4" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold">&amp; Hold</text>
    <text x="594" y="222" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">@ f<tspan font-size="8" dy="2">s</tspan><tspan dy="-2"> Hz</tspan></text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="654" y1="200" x2="694" y2="200" stroke="#55efc4" stroke-width="1.5" opacity="0.5"/>
  <polygon points="694,200 687,196 687,204" fill="#55efc4" opacity="0.6"/>

  <!-- ===== BLOCK 5: Quantizer ===== -->
  <g>
    <rect x="698" y="165" width="120" height="70" rx="10" fill="url(#purpleBlockGrad)" stroke="#a29bfe" stroke-width="1.2"/>
    <text x="758" y="195" text-anchor="middle" fill="#a29bfe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Quantizer</text>
    <text x="758" y="215" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">n-bit resolution</text>
  </g>

  <!-- Arrow 5→Output -->
  <line x1="818" y1="200" x2="858" y2="200" stroke="#a29bfe" stroke-width="1.5" opacity="0.5"/>
  <polygon points="858,200 851,196 851,204" fill="#a29bfe" opacity="0.6"/>

  <!-- ===== OUTPUT: PCM ===== -->
  <g>
    <rect x="862" y="172" width="100" height="56" rx="8" fill="none" stroke="#6c7a89" stroke-width="1"/>
    <text x="912" y="197" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">PCM</text>
    <text x="912" y="215" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9" opacity="0.7">Digital Samples</text>
  </g>

  <!-- ==================== WAVEFORM REPRESENTATIONS ==================== -->
  <!-- Mini waveforms below each block showing signal transformation -->

  <!-- Wave 1: Raw analog (under Mic Capsule) — small sine -->
  <g transform="translate(102, 290)" filter="url(#glowSoft)">
    <text x="0" y="-8" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9">analog signal</text>
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#141416" stroke="#2a2a3a" stroke-width="0.8"/>
    <!-- Axes -->
    <line x1="-45" y1="25" x2="45" y2="25" stroke="#2a2a3a" stroke-width="0.5"/>
    <!-- Sine wave — tiny, noisy-looking -->
    <path d="M -42,25 C -38,15 -32,15 -28,25 C -24,35 -18,35 -14,25 C -10,15 -4,15 0,25 C 4,35 10,35 14,25 C 18,15 24,15 28,25 C 32,35 38,35 42,25"
          fill="none" stroke="#00CEC9" stroke-width="1.5" opacity="0.8"/>
  </g>
  <!-- Leader line from mic block to waveform -->
  <line x1="102" y1="235" x2="102" y2="282" stroke="#00CEC9" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Wave 2: Amplified analog (under Preamp) — sine with high-freq harmonics riding on top -->
  <g transform="translate(266, 290)" filter="url(#glowSoft)">
    <text x="0" y="-8" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9">amplified</text>
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#141416" stroke="#2a2a3a" stroke-width="0.8"/>
    <line x1="-45" y1="25" x2="45" y2="25" stroke="#2a2a3a" stroke-width="0.5"/>
    <!-- Sine wave with high-frequency ripple (harmonics + noise above Nyquist) -->
    <path d="M -42,25 C -40,20 -39,16 -37,13 C -36,11 -35,14 -34,12 C -33,10 -32,13 -31,11 C -30,13 -29,16 -28,25 C -27,30 -26,34 -25,36 C -24,38 -23,35 -22,37 C -21,39 -20,42 -19,40 C -18,42 -17,38 -16,36 C -15,34 -14,28 -14,25 C -13,20 -11,16 -9,13 C -8,11 -7,14 -6,12 C -5,10 -4,13 -3,11 C -2,13 -1,16 0,25 C 1,30 2,34 3,36 C 4,38 5,35 6,37 C 7,39 8,42 9,40 C 10,42 11,38 12,36 C 13,34 14,28 14,25 C 15,20 17,16 19,13 C 20,11 21,14 22,12 C 23,10 24,13 25,11 C 26,13 27,16 28,25 C 29,30 30,34 31,36 C 32,38 33,35 34,37 C 35,39 36,42 37,40 C 38,42 39,38 40,36 C 41,34 42,28 42,25"
          fill="none" stroke="#d4a050" stroke-width="1.3" opacity="0.8"/>
  </g>
  <line x1="266" y1="235" x2="266" y2="282" stroke="#d4a050" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Wave 3: Filtered (under Anti-Alias) — smooth sine, same amplitude -->
  <g transform="translate(430, 290)" filter="url(#glowSoft)">
    <text x="0" y="-8" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9">bandlimited</text>
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#141416" stroke="#2a2a3a" stroke-width="0.8"/>
    <line x1="-45" y1="25" x2="45" y2="25" stroke="#2a2a3a" stroke-width="0.5"/>
    <!-- Clean sine — smoother, same amplitude as amplified -->
    <path d="M -42,25 C -38,9 -32,9 -28,25 C -24,41 -18,41 -14,25 C -10,9 -4,9 0,25 C 4,41 10,41 14,25 C 18,9 24,9 28,25 C 32,41 38,41 42,25"
          fill="none" stroke="#00CEC9" stroke-width="1.5" opacity="0.8"/>
  </g>
  <line x1="430" y1="235" x2="430" y2="282" stroke="#00CEC9" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Wave 4: Sampled (under Sample & Hold) — dots on a sine, with stems -->
  <g transform="translate(594, 290)" filter="url(#glowSoft)">
    <text x="0" y="-8" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9">sampled</text>
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#141416" stroke="#2a2a3a" stroke-width="0.8"/>
    <line x1="-45" y1="25" x2="45" y2="25" stroke="#2a2a3a" stroke-width="0.5"/>
    <!-- Stem plot: vertical lines + dots at sample points -->
    <!-- Sample points following the sine: at x = -42,-30,-18,-6,6,18,30,42 -->
    <line x1="-42" y1="25" x2="-42" y2="25" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="-42" cy="25" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="-30" y1="25" x2="-30" y2="11" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="-30" cy="11" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="-18" y1="25" x2="-18" y2="39" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="-18" cy="39" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="-6" y1="25" x2="-6" y2="25" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="-6" cy="25" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="6" y1="25" x2="6" y2="11" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="6" cy="11" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="18" y1="25" x2="18" y2="39" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="18" cy="39" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="30" y1="25" x2="30" y2="25" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="30" cy="25" r="2" fill="#55efc4" opacity="0.9"/>

    <line x1="42" y1="25" x2="42" y2="11" stroke="#55efc4" stroke-width="1" opacity="0.6"/>
    <circle cx="42" cy="11" r="2" fill="#55efc4" opacity="0.9"/>
  </g>
  <line x1="594" y1="235" x2="594" y2="282" stroke="#55efc4" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Wave 5: Quantized (under Quantizer) — staircase -->
  <g transform="translate(758, 290)" filter="url(#glowSoft)">
    <text x="0" y="-8" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9">quantized</text>
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#141416" stroke="#2a2a3a" stroke-width="0.8"/>
    <line x1="-45" y1="25" x2="45" y2="25" stroke="#2a2a3a" stroke-width="0.5"/>
    <!-- Quantization levels (horizontal guides) -->
    <line x1="-45" y1="11" x2="45" y2="11" stroke="#2a2a3a" stroke-width="0.3" opacity="0.4"/>
    <line x1="-45" y1="18" x2="45" y2="18" stroke="#2a2a3a" stroke-width="0.3" opacity="0.4"/>
    <line x1="-45" y1="32" x2="45" y2="32" stroke="#2a2a3a" stroke-width="0.3" opacity="0.4"/>
    <line x1="-45" y1="39" x2="45" y2="39" stroke="#2a2a3a" stroke-width="0.3" opacity="0.4"/>
    <!-- Staircase waveform snapped to levels -->
    <path d="M -42,25 L -30,25 L -30,11 L -18,11 L -18,39 L -6,39 L -6,25 L 6,25 L 6,11 L 18,11 L 18,39 L 30,39 L 30,25 L 42,25"
          fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.9"/>
  </g>
  <line x1="758" y1="235" x2="758" y2="282" stroke="#a29bfe" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Output: Binary representation (under PCM) -->
  <g transform="translate(912, 290)">
    <text x="0" y="-8" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9">digital</text>
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#141416" stroke="#2a2a3a" stroke-width="0.8"/>
    <!-- Binary digits stacked -->
    <text x="0" y="16" text-anchor="middle" fill="#6c7a89" font-family="Courier New, monospace" font-size="9" opacity="0.7">0110 1010</text>
    <text x="0" y="28" text-anchor="middle" fill="#6c7a89" font-family="Courier New, monospace" font-size="9" opacity="0.7">1101 0011</text>
    <text x="0" y="40" text-anchor="middle" fill="#6c7a89" font-family="Courier New, monospace" font-size="9" opacity="0.7">1001 1110</text>
  </g>
  <line x1="912" y1="228" x2="912" y2="282" stroke="#6c7a89" stroke-width="0.6" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- ==================== DOMAIN BRACKETS ==================== -->
  <!-- Analog domain bracket -->
  <line x1="42" y1="380" x2="490" y2="380" stroke="#00CEC9" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="376" x2="42" y2="384" stroke="#00CEC9" stroke-width="1" opacity="0.3"/>
  <line x1="490" y1="376" x2="490" y2="384" stroke="#00CEC9" stroke-width="1" opacity="0.3"/>
  <rect x="200" y="388" width="130" height="20" rx="10" fill="#00CEC9" opacity="0.06" stroke="#00CEC9" stroke-width="0.6" opacity="0.3"/>
  <text x="265" y="402" text-anchor="middle" fill="#00CEC9" font-family="Segoe UI, Arial, sans-serif" font-size="11" opacity="0.6">ANALOG DOMAIN</text>

  <!-- Digital domain bracket -->
  <line x1="534" y1="380" x2="962" y2="380" stroke="#a29bfe" stroke-width="1" opacity="0.3"/>
  <line x1="534" y1="376" x2="534" y2="384" stroke="#a29bfe" stroke-width="1" opacity="0.3"/>
  <line x1="962" y1="376" x2="962" y2="384" stroke="#a29bfe" stroke-width="1" opacity="0.3"/>
  <rect x="683" y="388" width="130" height="20" rx="10" fill="#a29bfe" opacity="0.06" stroke="#a29bfe" stroke-width="0.6" opacity="0.3"/>
  <text x="748" y="402" text-anchor="middle" fill="#a29bfe" font-family="Segoe UI, Arial, sans-serif" font-size="11" opacity="0.6">DIGITAL DOMAIN</text>

  <!-- Boundary marker -->
  <line x1="512" y1="140" x2="512" y2="385" stroke="#6c7a89" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>
  <text x="512" y="135" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="9" opacity="0.5">ADC boundary</text>

  <!-- ==================== KEY PARAMETERS ==================== -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="880" height="55" rx="8" fill="#1a1a1e" stroke="#2a2a3a" stroke-width="0.8"/>

    <!-- Sample Rate -->
    <text x="30" y="22" fill="#55efc4" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Sample Rate</text>
    <text x="30" y="40" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">44.1 / 48 kHz typical</text>

    <!-- Bit Depth -->
    <line x1="220" y1="10" x2="220" y2="45" stroke="#2a2a3a" stroke-width="0.5"/>
    <text x="250" y="22" fill="#a29bfe" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Bit Depth</text>
    <text x="250" y="40" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">16-bit (CD) / 24-bit (pro)</text>

    <!-- Dynamic Range -->
    <line x1="460" y1="10" x2="460" y2="45" stroke="#2a2a3a" stroke-width="0.5"/>
    <text x="490" y="22" fill="#d4a050" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Dynamic Range</text>
    <text x="490" y="40" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">~6 dB per bit → 96 dB @ 16-bit</text>

    <!-- Data Rate -->
    <line x1="720" y1="10" x2="720" y2="45" stroke="#2a2a3a" stroke-width="0.5"/>
    <text x="750" y="22" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold">Raw PCM</text>
    <text x="750" y="40" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="10">~1.4 Mbps (CD stereo)</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <text x="500" y="512" text-anchor="middle" fill="#6c7a89" font-family="Segoe UI, Arial, sans-serif" font-size="11">Mic voltage → Amplify → Filter → Sample at regular intervals → Quantize to n-bit integers → PCM stream</text>
</svg>